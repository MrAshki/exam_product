services:
  postgres:
    image: postgres:16-alpine
    container_name: exam_postgres
    environment:
      POSTGRES_DB: exam_db
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_password
    ports:
      - "5555:5432"
    volumes:
      - exam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_user -d exam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: exam_redis
    ports:
      - "16379:6379"
    volumes:
      - exam_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  exam_postgres_data:
  exam_redis_data:
